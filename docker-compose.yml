# Local run: API + MongoDB. Optional Redis for cache. Admin UI: npm run dev with VITE_API_BASE=http://localhost:8000/v1
services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://mongo:27017/saas_db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      REDIS_URI: ${REDIS_URI:-}
    depends_on:
      mongo:
        condition: service_started
    restart: unless-stopped

  # Optional: start Redis and set REDIS_URI=redis://redis:6379/0 to enable tenant-settings cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data: {}
